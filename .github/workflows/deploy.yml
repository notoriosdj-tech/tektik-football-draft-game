name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Generate full player database
        run: |
          node <<'NODE'
          const fs = require('fs');
          const zlib = require('zlib');
          const https = require('https');
          const url = 'https://pub-e682421888d945d684bcae8890b0ec20.r2.dev/data/players.csv.gz';
          const flags = {Argentina:'🇦🇷',Portugal:'🇵🇹',Brazil:'🇧🇷',France:'🇫🇷',Spain:'🇪🇸',Germany:'🇩🇪',Italy:'🇮🇹',England:'🏴',Netherlands:'🇳🇱',Croatia:'🇭🇷',Belgium:'🇧🇪',Uruguay:'🇺🇾',Egypt:'🇪🇬',Morocco:'🇲🇦',Norway:'🇳🇴',Poland:'🇵🇱',Sweden:'🇸🇪',Denmark:'🇩🇰',Senegal:'🇸🇳','Ivory Coast':'🇨🇮',Nigeria:'🇳🇬',Ghana:'🇬🇭','United States':'🇺🇸',Canada:'🇨🇦',Ukraine:'🇺🇦',Colombia:'🇨🇴',Serbia:'🇷🇸'};
          const posMap = {'Goalkeeper':['GK'],'Centre-Back':['CB'],'Left-Back':['LB','LWB'],'Right-Back':['RB','RWB'],'Defensive Midfield':['CDM','CM'],'Central Midfield':['CM','CDM','CAM'],'Attacking Midfield':['CAM','CM'],'Left Midfield':['LM','LW'],'Right Midfield':['RM','RW'],'Left Winger':['LW','ST'],'Right Winger':['RW','ST'],'Second Striker':['ST','CAM'],'Centre-Forward':['ST','CF'],Attack:['ST'],Midfield:['CM'],Defender:['CB']};
          const overrides = {'lionel messi':{rating:99,pos:['RW','CAM','CF','ST','LW'],short:'Messi'},'cristiano ronaldo':{rating:98,pos:['LW','ST','RW'],short:'CR7'},ronaldinho:{rating:97,pos:['LW','CAM'],short:'Dinho'},'zinedine zidane':{rating:96,pos:['CAM','CM'],short:'Zidane'},'andres iniesta':{rating:96,pos:['CM','CAM','LM'],short:'Iniesta'},xavi:{rating:96,pos:['CM','CDM'],short:'Xavi'},'luka modric':{rating:95,pos:['CM','CAM','CDM'],short:'Modric'},ronaldo:{rating:94,pos:['ST','CF'],short:'R9'},'paolo maldini':{rating:91,pos:['CB','LB'],short:'Maldini'},'gianluigi buffon':{rating:95,pos:['GK'],short:'Buffon'},'iker casillas':{rating:94,pos:['GK'],short:'Casillas'},'manuel neuer':{rating:95,pos:['GK'],short:'Neuer'}};
          function parseCSV(s){const rows=[];let row=[],cell='',q=false;for(let i=0;i<s.length;i++){const c=s[i],n=s[i+1];if(c==='"'&&q&&n==='"'){cell+='"';i++;}else if(c==='"'){q=!q;}else if(c===','&&!q){row.push(cell);cell='';}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cell);if(row.some(x=>x!==''))rows.push(row);row=[];cell='';}else cell+=c;}if(cell||row.length){row.push(cell);rows.push(row);}return rows;}
          function n(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9 ]+/g,'').trim();}
          function rating(value){const v=Number(value||0);for(const [lim,r] of [[180000000,97],[150000000,96],[120000000,95],[100000000,94],[80000000,92],[60000000,90],[40000000,87],[25000000,84],[10000000,80],[5000000,76],[1000000,72]]) if(v>=lim) return r; return 68;}
          function group(pos){const p=pos[0]||'CM'; if(p==='GK')return 'GK'; if(['CB','LB','RB','LWB','RWB'].includes(p))return 'DEF'; if(['CDM','CM','CAM','LM','RM'].includes(p))return 'MID'; return 'ATT';}
          function traits(g,r){const b={pac:60,sho:50,pas:50,dri:50,def:45,phy:60,gk:5,big:Math.max(60,r-5),lead:Math.max(55,r-8)}; if(g==='GK')Object.assign(b,{gk:Math.min(99,r+2),def:40,phy:Math.max(60,r-8),pas:Math.max(45,r-18),sho:8,dri:20,pac:48}); else if(g==='DEF')Object.assign(b,{def:r,phy:Math.max(65,r-4),pas:Math.max(55,r-13),pac:Math.max(58,r-10),sho:Math.max(35,r-35),dri:Math.max(45,r-18)}); else if(g==='MID')Object.assign(b,{pas:r,dri:Math.max(60,r-8),def:Math.max(55,r-12),sho:Math.max(55,r-16),pac:Math.max(58,r-14),phy:Math.max(60,r-10)}); else Object.assign(b,{sho:r,dri:Math.max(65,r-5),pac:Math.max(65,r-6),pas:Math.max(55,r-12),def:Math.max(25,r-35),phy:Math.max(60,r-10)}); return Object.fromEntries(Object.entries(b).map(([k,v])=>[k,Math.max(1,Math.min(99,Math.round(v)))]));}
          https.get(url,res=>{const chunks=[];res.on('data',d=>chunks.push(d));res.on('end',()=>{const text=zlib.gunzipSync(Buffer.concat(chunks)).toString('utf8');const table=parseCSV(text);const headers=table.shift();const out=[];const seen=new Set();for(const arr of table){const row=Object.fromEntries(headers.map((h,i)=>[h,arr[i]||'']));const name=row.name||row.player_name;if(!name)continue;const id=String(row.player_id||row.id||name);if(seen.has(id))continue;seen.add(id);const ov=overrides[n(name)];let pos=(posMap[row.sub_position]||posMap[row.position]||['CM']).slice();let r=rating(row.market_value_in_eur||row.highest_market_value_in_eur);if(ov){pos=ov.pos;r=ov.rating;}const country=row.country_of_citizenship||row.country_name||row.nationality||'';const parts=name.split(/\s+/);out.push({id,name,short:(ov&&ov.short)||parts[parts.length-1],flag:flags[country]||'🏳️',pos,rating:r,t:traits(group(pos),r),img:''});}out.sort((a,b)=>b.rating-a.rating||a.name.localeCompare(b.name));fs.mkdirSync('src/data',{recursive:true});fs.writeFileSync('src/data/generated-players.json',JSON.stringify(out));console.log('Generated players:',out.length);});}).on('error',e=>{console.error(e);process.exit(1);});
          NODE
      - name: Apply smarter CPU draft patch
        run: node scripts/patch-smart-cpu.cjs
      - name: Apply duplicate player identity patch
        run: node scripts/patch-no-duplicate-names.cjs
      - name: Build production app
        run: npx vite build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4